<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Rostmy</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="content">
        <div class="card">
            <h2>Bienvenido a</h2>
            <img src="/images/poya.svg" height="166" width="166"><h1 style="display: inline-block;">Rostmy</h1>
            <p>Inicia sesión para empezar</p>
            
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            
            <button class="login" id="btn-login">Entrar</button>
            <a href="/register.html">¿No tienes cuenta? Regístrate</a>
            
            <br>
            <br>
            <br>
            <br>
            <br>
            <a href="https://github.com/iliekcatsss/rostmy">Ver código fuente</a>

            <h3>Último commit</h3>

            <p><strong>Mensaje:</strong> <span id="commit-msg"></span></p>
            <p><strong>Fecha:</strong> <span id="commit-date"></span></p>
            <p><strong>Link:</strong> <a id="commit-link" target="_blank"><span id="commit-sha"></span></a></p>

            <script src="js/lastupdate.js"></script>
            <script type="module" src="js/login.js"></script>
        </div>
    </div>
</body>
</html>
