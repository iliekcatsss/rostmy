<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rostmy</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="/images/favicon-dark.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/images/favicon-light.ico" media="(prefers-color-scheme: dark)">
</head>
<body>
    <div id="navbar" class="navbar">
        <input type="text" id="search-input" placeholder="Buscar..." class="search-bar">
        <div id="search-results" class="search-results" style="display:none;"></div>
    </div>
    <button id="btn-menu">☰</button>
    <div class="overlay" id="overlay"></div>
    <button id="btn-tabs">⬜ <span id="tabs-count">0</span></button>
    <div id="tabs-dropdown" class="tabs-dropdown"></div>
    
    <div class="content">
        <div class="card side">
            <button id="btn-logout" class="icon"><i data-lucide="log-out"></i></button>
            
            <button id="btn-ajustes" class="icon"><i data-lucide="settings"></i></button>
        </div>
        <div class="card tree">
            <aside class="sidebar">
                <button id="btn-nueva-carpeta" class="icon"><i data-lucide="folder-plus"></i></button>
                <ul class="tree" id="arbol"></ul>
            </aside>
        </div>
        <div class="content-right">
            <div class="tabs-row">
                <div id="tabs-bar"></div>
                <!-- <div class="tabs-acciones">
                </div> -->
            </div>
            <div class="card main">
                <h1 id="placeholder-title">Rostmy</h1>
                <p id="placeholder-content">Esta es una app en desarrollo. Si encuentras un bug o tienes una sugerencia, abre un <a href="https://github.com/iliekcatsss/rostmy/issues">issue</a> o envía un <a href="mailto:iliekcatsss@proton.me">correo</a></p>
                
                <main class="detail" id="editor-view" style="display: none;">
                    <input class="detail-titulo" type="text" placeholder="Título...">
                    <div class="editor-container">
                        <textarea id="editor" class="detail-contenido" placeholder="Escribe aquí..."></textarea>
                        <div id="preview" class="markdown-body"></div>
                    </div>
                    
                    <button class="guardar">Guardar</button>
                </main>
            </div>
        </div>
    </div>

    <div id="modal-mover" class="modal" style="display: none;">|
        <div class="modal-contenido">
            <h3>Mover a...</h3>
            <ul id="modal-lista"></ul>
            <button id="modal-cancelar">Cancelar</button>
        </div>
    </div>

    <div class="context-menu" id="context-menu" style="display: none;">
        <button class="context-item" data-action="nueva-entrada">
            <i data-lucide="file-plus-corner"></i> Nueva entrada
        </button>
        <button class="context-item" data-action="nueva-sub">
            <i data-lucide="folder-plus"></i> Nueva subcarpeta
        </button>
        <button class="context-item" data-action="rename">
            <i data-lucide="pencil"></i> Renombrar
        </button>
        <button class="context-item" data-action="move">
            <i data-lucide="box"></i> Renombrar
        </button>
        <button class="context-item" data-action="share">
            <i data-lucide="link"></i> Compartir
        </button>
        <button class="context-item" data-action="delete">
            <i data-lucide="trash-2"></i> Eliminar
        </button>
    </div>

    <div id="modal-ajustes" class="modal" style="display: none;">
        <div class="modal-contenido ajustes">
            <div class="ajustes-sidebar">
                <h3>Ajustes</h3>
                <button class="ajuste-tab activa" data-tab="cuenta">Cuenta</button>
                <button class="ajuste-tab" data-tab="apariencia">Apariencia</button>
            </div>
            <div class="ajustes-contenido">
                <div class="ajuste-panel activo" id="tab-cuenta">
                    <h3>Cuenta</h3>
                    <p id="ajuste-email"></p>
                    <button id="btn-cambiar-password">Cambiar contraseña</button>
                    <button id="btn-logout-ajustes">Cerrar sesión</button>
                </div>
                <div class="ajuste-panel" id="tab-apariencia">
                    <h3>Apariencia</h3>
                    <label>
                        <span>Tema</span>
                        <select id="select-tema">
                            <option value="oscuro">Oscuro</option>
                            <option value="claro">Claro</option>
                            <option value="dispositivo">Sincronizar con el dispositivo</option>
                        </select>
                    </label>
                </div>
            </div>
            <button id="modal-ajustes-cerrar">✕</button>
        </div>
    </div>
        
    <!-- scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
